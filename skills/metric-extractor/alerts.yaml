# Alert configuration template for metric-extractor pipeline
# Copy to analytics/alerts.yaml and replace <your-metric-name> with real metric names.
# Read by push-and-notify.py at runtime.

telegram:
  bot_token_env: TELEGRAM_BOT_TOKEN   # env var name (not the value)
  chat_id_env: TELEGRAM_CHAT_ID

alerts:
  # Type 1: Any metric returns status=error → fire immediately
  - type: failure

  # Type 2: Metric value changed by at least min_delta in given direction
  - type: metric_change
    metric: <your-metric-name>
    label: "<Human-readable label>"
    direction: increase   # increase | decrease | any
    min_delta: 1          # minimum absolute change to trigger
